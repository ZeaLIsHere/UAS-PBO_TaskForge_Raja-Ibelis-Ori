# H2 Database (file-based agar data persisten setelah restart)
spring.datasource.url=jdbc:h2:file:./taskforgedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=taskforge-super-secret-key-for-jwt-signing-minimum-256-bits-long-enough
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=C:/Users/grego/taskforge/uploads

# Server
server.port=8080

# Logging
logging.level.com.taskforge=DEBUG
